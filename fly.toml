app = "smart-api-rate-limiter-with-adaptive-scaling"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  JAVA_OPTS = "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError -Djava.security.egd=file:/dev/./urandom"
  # Disable Redis auto-configuration so the app starts without a Redis instance
  SPRING_AUTOCONFIGURE_EXCLUDE = "org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration"
  MANAGEMENT_HEALTH_REDIS_ENABLED = "false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "40s"
    interval = "30s"
    method = "GET"
    path = "/actuator/health"
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
