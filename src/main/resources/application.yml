# Application Configuration
spring:
  application:
    name: smart-rate-limiter

  # Redis Configuration for Distributed Rate Limiting
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          enabled: true
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms
        shutdown-timeout: 200ms

# Server Configuration
server:
  port: 8080
  shutdown: graceful  # Enable graceful shutdown for Kubernetes

# Rate Limiter Configuration
rate-limiter:
  token-bucket:
    enabled: true
    capacity: 100        # Maximum number of tokens
    refill-rate: 10.0    # Tokens per second

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true  # Enable Kubernetes probes
  health:
    livenessState:
      enabled: true  # Enable liveness state
    readinessState:
      enabled: true  # Enable readiness state
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    com.ratelimiter: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Spring Boot Configuration
spring.lifecycle:
  timeout-per-shutdown-phase: 30s  # Graceful shutdown timeout
