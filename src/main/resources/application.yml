# Application Configuration
spring:
  application:
    name: smart-rate-limiter

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

# Server Configuration
server:
  port: 8080

# Rate Limiter Configuration
rate-limiter:
  token-bucket:
    enabled: true
    capacity: 100        # Maximum number of tokens
    refill-rate: 10.0    # Tokens per second

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    com.ratelimiter: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
